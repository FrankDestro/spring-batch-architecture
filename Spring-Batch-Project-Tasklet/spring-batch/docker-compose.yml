networks:
  spring-batch-network:
    driver: bridge

volumes:
  mysql-spring-batch-data:
  mysql-spring-batch-businnes:

# ====================================================================================================================
# Mysql - Spring Batch Metadados
# ====================================================================================================================
services:
  mysql-spring-batch-metadados:
    image: mysql:8.0
    container_name: mysql-spring-batch-metadados
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234567
      MYSQL_DATABASE: spring_batch
      TZ: "America/Sao_Paulo"
    ports:
      - "3307:3306"
    volumes:
      - mysql-spring-batch-data:/var/lib/mysql
    networks:
      - spring-batch-network
    profiles:
      - spring-batch-metadados

# ====================================================================================================================
# Mysql - Spring Batch Business
# ====================================================================================================================
  mysql-spring-batch-businnes:
    image: mysql:8.0
    container_name: mysql-spring-batch-businnes
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234567
      MYSQL_DATABASE: spring_batch_businnes
      TZ: "America/Sao_Paulo"
    ports:
      - "3308:3306"
    volumes:
      - mysql-spring-batch-businnes:/var/lib/mysql
    networks:
      - spring-batch-network
    profiles:
      - spring_batch_businnes
